# ──────────────────────────────────────────────────────────────
# Automated release pipeline
# Trigger: workflow_dispatch with version input
# Flow: validate → build 9 platforms → generate checksums →
#        commit checksums to skill folders → tag → publish Release
# Artifacts: raw binaries (not tar.gz), with checksums.txt
# ──────────────────────────────────────────────────────────────
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.0.3) — must match Cargo.toml"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_DIR: cli
  BIN_NAME: onchainos

jobs:
  # ── Step 1: Validate version input ──────────────────────────
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ inputs.version }}
      tag: v${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from Cargo.toml
        id: cargo_ver
        run: |
          VER=$(grep '^version' "$CARGO_DIR"/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "value=$VER" >> "$GITHUB_OUTPUT"

      - name: Validate Cargo.toml version matches input
        env:
          INPUT_VERSION: ${{ inputs.version }}
          CARGO_VER: ${{ steps.cargo_ver.outputs.value }}
        run: |
          if [ "$CARGO_VER" != "$INPUT_VERSION" ]; then
            echo "::error::Cargo.toml version ($CARGO_VER) != input ($INPUT_VERSION). Update Cargo.toml first."
            exit 1
          fi

      - name: Ensure tag does not already exist on origin
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/v${INPUT_VERSION}" "refs/tags/v${INPUT_VERSION}^{}" >/dev/null 2>&1; then
            echo "::error::Tag v${INPUT_VERSION} already exists on origin."
            exit 1
          fi

  # ── Step 2: Build raw binaries for 9 platforms in parallel ──
  build:
    needs: validate
    runs-on: ${{ matrix.os }}
    env:
      SM_API_KEY: ${{ secrets.SM_API_KEY }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS (Apple Silicon + Intel) ──
          - { target: aarch64-apple-darwin, os: macos-latest }
          - { target: x86_64-apple-darwin, os: macos-latest }
          # ── Linux (x64 native, others via cross-compilation) ──
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: i686-unknown-linux-gnu, os: ubuntu-latest, cross: true }
          - {
              target: aarch64-unknown-linux-gnu,
              os: ubuntu-latest,
              cross: true,
            }
          - {
              target: armv7-unknown-linux-gnueabihf,
              os: ubuntu-latest,
              cross: true,
            }
          # ── Windows (x64 / x86 / ARM64) ──
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
          - { target: i686-pc-windows-msvc, os: windows-latest }
          - { target: aarch64-pc-windows-msvc, os: windows-latest }

    name: Build ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.CARGO_DIR }}
          key: ${{ matrix.target }}

      - name: "Install cross (Linux cross-compilation tool)"
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary
        working-directory: ${{ env.CARGO_DIR }}
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          USE_CROSS: ${{ matrix.cross }}
        run: |
          if [ "$USE_CROSS" = "true" ]; then
            cross build --release --target "$TARGET"
          else
            cargo build --release --target "$TARGET"
          fi

      - name: "Prepare artifact (Unix: strip symbols + rename)"
        if: runner.os != 'Windows'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          USE_CROSS: ${{ matrix.cross }}
        run: |
          src="${CARGO_DIR}/target/${TARGET}/release/${BIN_NAME}"
          if [ "$USE_CROSS" != "true" ]; then
            strip "$src" 2>/dev/null || true
          fi
          cp "$src" "${BIN_NAME}-${TARGET}"
          chmod +x "${BIN_NAME}-${TARGET}"

      - name: "Prepare artifact (Windows: rename .exe)"
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
        run: |
          Copy-Item "${env:CARGO_DIR}\target\${env:TARGET}\release\${env:BIN_NAME}.exe" `
                    "${env:BIN_NAME}-${env:TARGET}.exe"

      # ── Windows code signing with jsign + DigiCert ONE ──
      - name: "Setup DigiCert certificate"
        if: runner.os == 'Windows' && env.SM_API_KEY != ''
        env:
          SM_API_KEY: ${{ secrets.SM_API_KEY }}
          SM_CLIENT_CERT_FILE_B64: ${{ secrets.SM_CLIENT_CERT_FILE_B64 }}
        shell: pwsh
        run: |
          $certPath = "${{ runner.temp }}\Certificate_pkcs12.p12"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:SM_CLIENT_CERT_FILE_B64))
          Write-Host "Certificate file size: $((Get-Item $certPath).Length) bytes"
          "SM_CLIENT_CERT_FILE=$certPath" >> $env:GITHUB_ENV

      - name: "Download jsign"
        if: runner.os == 'Windows' && env.SM_API_KEY != ''
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/ebourg/jsign/releases/download/7.0/jsign-7.0.jar" `
            -OutFile "${{ runner.temp }}\jsign.jar"

      - name: "Sign Windows binary (DigiCert ONE via jsign)"
        if: runner.os == 'Windows' && env.SM_API_KEY != ''
        shell: pwsh
        run: |
          $storepass = "${{ secrets.SM_API_KEY }}|${{ env.SM_CLIENT_CERT_FILE }}|${{ secrets.SM_CLIENT_CERT_PASSWORD }}"
          java -jar "${{ runner.temp }}\jsign.jar" `
            --storetype DIGICERTONE `
            --storepass $storepass `
            --alias "${{ secrets.SM_CERTIFICATE_ID }}" `
            --tsaurl "http://timestamp.digicert.com" `
            "${{ env.BIN_NAME }}-${{ matrix.target }}.exe"

      - name: "Verify Windows binary signature"
        if: runner.os == 'Windows' && env.SM_API_KEY != ''
        shell: pwsh
        run: |
          $sig = Get-AuthenticodeSignature "${{ env.BIN_NAME }}-${{ matrix.target }}.exe"
          Write-Host "Signature status: $($sig.Status)"
          Write-Host "Signer: $($sig.SignerCertificate.Subject)"
          if ($sig.Status -ne 'Valid') {
            Write-Host "::warning::Code signing verification failed with status: $($sig.Status)"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.target }}
          path: ${{ env.BIN_NAME }}-${{ matrix.target }}*

  # ── Step 3: Generate SHA256 checksums ───────────────────────
  checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate SHA256 checksum file
        run: sha256sum ${BIN_NAME}-* > checksums.txt

      - name: List checksums
        run: cat checksums.txt

      - uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: checksums.txt

  # ── Step 4: Commit checksums to repo and create tag ─────────
  commit-and-tag:
    needs: [validate, checksums]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Use RELEASE_PAT if branch protection is enabled, otherwise GITHUB_TOKEN
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref_name }}

      - uses: actions/download-artifact@v4
        with:
          name: checksums
          path: /tmp/checksums

      - name: Embed checksums into SKILL.md files and update installers
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          CHECKSUMS_FILE="/tmp/checksums/checksums.txt"

          # Inject checksums into the Binary Checksums section of each SKILL.md
          # Uses python3 (available on all ubuntu runners) because awk -v
          # cannot handle multi-line strings from sha256sum output
          for skill_md in skills/*/SKILL.md; do
            python3 -c "
          import re, sys
          checksums = open('$CHECKSUMS_FILE').read().strip()
          content = open('$skill_md').read()
          pattern = r'(<!-- BEGIN_CHECKSUMS[^>]*-->)\n.*?\n(<!-- END_CHECKSUMS -->)'
          replacement = r'\1\n\`\`\`\n' + checksums + r'\n\`\`\`\n\2'
          result = re.sub(pattern, replacement, content, flags=re.DOTALL)
          open('$skill_md', 'w').write(result)
          "
          done

          # Update REQUIRED_VERSION in install.sh (macOS/Linux)
          sed -i "s/^REQUIRED_VERSION=.*/REQUIRED_VERSION=\"${VERSION}\"/" install.sh

          # Update REQUIRED_VERSION in install.ps1 (Windows)
          sed -i "s/^\\\$REQUIRED_VERSION = .*/\$REQUIRED_VERSION = \"${VERSION}\"/" install.ps1

          # Compute installer checksums (after version update, before SKILL.md injection)
          sha256sum install.sh install.ps1 > /tmp/installer-checksums.txt
          echo "Installer checksums:"
          cat /tmp/installer-checksums.txt

          # Inject installer checksums into the Installer Checksums section of each SKILL.md
          INSTALLER_CHECKSUMS="/tmp/installer-checksums.txt"
          for skill_md in skills/*/SKILL.md; do
            python3 -c "
          import re
          checksums = open('$INSTALLER_CHECKSUMS').read().strip()
          content = open('$skill_md').read()
          pattern = r'(<!-- BEGIN_INSTALLER_CHECKSUMS[^>]*-->)\n.*?\n(<!-- END_INSTALLER_CHECKSUMS -->)'
          replacement = r'\1\n\`\`\`\n' + checksums + r'\n\`\`\`\n\2'
          result = re.sub(pattern, replacement, content, flags=re.DOTALL)
          open('$skill_md', 'w').write(result)
          "
          done

          # Update tagged version in SKILL.md install URLs
          sed -i "s|/onchainos-skills/v[0-9.]*\/install|/onchainos-skills/v${VERSION}/install|g" skills/*/SKILL.md

          # Fail the release if any template placeholders remain after injection
          if grep -R -n 'PLACEHOLDER' skills install.sh install.ps1; then
            echo "::error::Release artifacts still contain PLACEHOLDER values after checksum injection."
            exit 1
          fi

      - name: Commit and tag
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/*/SKILL.md install.sh install.ps1
          git commit -m "release: v${VERSION} — embed checksums and pin version"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin HEAD --follow-tags

  # ── Step 5: Create GitHub Release ───────────────────────────
  release:
    needs: [validate, commit-and-tag, checksums]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List all release artifacts
        run: ls -lh && echo "---" && cat checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: v${{ needs.validate.outputs.version }}
          generate_release_notes: true
          files: |
            ${{ env.BIN_NAME }}-*
            checksums.txt
